function computeEarnedBadges(preds,scores,matches,tPicks,truth){
  const ids=new Set();
  if(Object.keys(preds).length>0) ids.add('b1');
  const finished=matches.filter(m=>m.status==='finished');
  if(finished.filter(m=>{const p=preds[m.id];return p&&p.hs===m.hs&&p.as===m.as;}).length>=5) ids.add('b2');
  if(finished.filter(m=>{const p=preds[m.id];return p&&p.firstScorer&&p.firstScorer===m.firstScorer;}).length>=3) ids.add('b3');
  if(scores.streak>=3) ids.add('b4');
  if(truth.revealed.champion&&tPicks.champion&&tPicks.champion===truth.champion) ids.add('b5');
  if(truth.revealed.topScorer&&tPicks.topScorer&&tPicks.topScorer===truth.topScorer) ids.add('b6');
  // Underdog: predicted AWAY win correctly on a finished match
  if(finished.some(m=>{const p=preds[m.id];return p&&p.winner==='AWAY'&&m.as>m.hs;})) ids.add('b7');
  if(scores.total>=200) ids.add('b8');
  return ids;
}

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function encData(obj){try{return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}catch{return '';}}
function decData(str){try{return JSON.parse(decodeURIComponent(escape(atob(str))));}catch{return null;}}
function makeJoinUrl(t,user){return`${location.href.split('#')[0]}#join:${encData({name:t.name,code:t.code,creator:user.name,creatorAvatar:user.avatar})}`;}
function makeFriendUrl(name,avatar,code){return`${location.href.split('#')[0]}#friend:${encData({name,avatar,code})}`;}

function scoreMatch(pred,m){
  if(!pred||m.status!=='finished')return{pts:0,flags:{}};
  let pts=0;const flags={};
  const res=m.hs>m.as?'HOME':m.as>m.hs?'AWAY':'DRAW';
  if(pred.winner){flags.winner=pred.winner===res;if(flags.winner)pts+=SCORING.winner;}
  if(pred.hs!=null&&pred.as!=null){flags.exact=pred.hs===m.hs&&pred.as===m.as;if(flags.exact)pts+=SCORING.exact;}
  if(pred.firstScorer){flags.firstScorer=pred.firstScorer===m.firstScorer;if(flags.firstScorer)pts+=SCORING.firstScorer;}
  // MOTM removed — football-data.org API doesn't provide this data
  if(pred.cleanSheet!=null){const cs=m.hs===0||m.as===0;flags.cleanSheet=pred.cleanSheet===cs;if(flags.cleanSheet)pts+=SCORING.cleanSheet;}
  return{pts,flags};
}

/* ── CONTEXT ── */
const Ctx=createContext(null);
function Provider({children}){
  const load=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
  const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

  const[user,setUserRaw]=useState(()=>load('wc_user'));
  const[preds,setPreds]=useState(()=>load('wc_preds')||{});
  const[matches,setMatches]=useState(()=>{
    const saved=load('wc_matches');
    const savedVersion=load('wc_matches_version');
    // If version changed (schedule updated), discard saved state and use fresh
    if(!saved||savedVersion!==MATCHES_VERSION)return MATCHES;
    return MATCHES.map(fresh=>{
      const s=saved.find(m=>m.id===fresh.id);
      if(!s)return fresh;
      return sanitizeMatch({...fresh,status:s.status,hs:s.hs,as:s.as,minute:s.minute||0,firstScorer:s.firstScorer||fresh.firstScorer,motm:s.motm||fresh.motm});
    });
  });
  const[tournaments,setTournaments]=useState(()=>(load('wc_tourns')||[]).map(t=>t.code?t:{...t,code:genCode()}));
  const[tPicks,setTPicks]=useState(()=>load('wc_tpicks')||{champion:null,top4:[null,null,null,null],topScorer:null,firstOut:null,locked:false});
  const[friends,setFriends]=useState(()=>load('wc_friends')||[]);
  // virtualFriends: {id -> {id,name,avatar}} for real users added via link (not mock users)
  const[virtualFriends,setVirtualFriends]=useState(()=>load('wc_vfriends')||{});
  const[truth,setTruth]=useState(()=>load('wc_truth')||{champion:'ARG',top4:['ARG','FRA','ENG','BRA'],topScorer:'mbappe',firstOut:'KSA',revealed:{champion:false,top4:false,topScorer:false,firstOut:false}});
  const[myCode]=useState(()=>{let c=load('wc_mycode');if(!c){c=genCode();try{localStorage.setItem('wc_mycode',JSON.stringify(c))}catch{}}return c;});
  const[palette,setPalette]=useState(()=>load('wc_palette')||0);
  const[fbUsers,setFbUsers]=useState({});
  const[wcTeams,setWcTeams]=useState({});
  const[toasts,setToasts]=useState([]);
  const[notifications,setNotifications]=useState(()=>load('wc_notifs')||[
    {id:'n0',type:'announcement',msg:'Welcome to the WC 2026 Prediction League! Make your first prediction now.',read:false,time:'just now'},
  ]);

  const PALETTES=[
    {em:'16 185 129',gd:'251 191 36',bl:'37 99 235'},
    {em:'6 182 212',gd:'168 85 247',bl:'14 165 233'},
    {em:'251 146 60',gd:'244 63 94',bl:'168 85 247'},
    {em:'52 211 153',gd:'250 204 21',bl:'239 68 68'},
  ];
  const PALETTE_NAMES=['Stadium','Ice','Sunset','Classic'];

  useEffect(()=>{const p=PALETTES[palette]||PALETTES[0];const r=document.documentElement.style;r.setProperty('--c-em',p.em);r.setProperty('--c-gd',p.gd);r.setProperty('--c-bl',p.bl);},[palette]);

  const setUser=u=>{setUserRaw(u);save('wc_user',u);if(u&&myCode)fbUpdate(`users/${myCode}`,{name:u.name,avatar:u.avatar||'⚽',favTeam:u.favTeam||null,pts:0,acc:0,updatedAt:Date.now()}).catch(()=>{});};
  useEffect(()=>{save('wc_preds',preds);},[preds]);
  useEffect(()=>{save('wc_matches',matches);save('wc_matches_version',MATCHES_VERSION);},[matches]);
  useEffect(()=>{save('wc_tourns',tournaments);},[tournaments]);
  useEffect(()=>{save('wc_tpicks',tPicks);},[tPicks]);
  useEffect(()=>{save('wc_friends',friends);},[friends]);
  useEffect(()=>{save('wc_vfriends',virtualFriends);},[virtualFriends]);
  useEffect(()=>{save('wc_truth',truth);},[truth]);
  useEffect(()=>{save('wc_palette',palette);},[palette]);
  useEffect(()=>{save('wc_notifs',notifications);},[notifications]);

  const toast=useCallback((msg,type='ok')=>{
    const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);

  const savePred=useCallback((mid,pred)=>{setPreds(p=>({...p,[mid]:pred}));toast('Prediction saved!');},[toast]);

  const addFriend=useCallback(uid=>{
    if(friends.includes(uid))return;
    setFriends(f=>[...f,uid]);
  },[friends]);

  const removeFriend=useCallback(uid=>setFriends(f=>f.filter(x=>x!==uid)),[]);

  const sendFriendRequest=useCallback(async(input,senderName,senderAvatar,senderCode)=>{
    const raw=input.trim();
    let u=null;
    // URL-encoded friend link
    if(raw.includes(':')){const enc=raw.split(':').slice(1).join(':');const d=decData(enc);if(d&&d.name)u={id:'url_'+(d.code||Date.now()),name:d.name,avatar:d.avatar||'⚽',fbCode:d.code};}
    // Mock user code
    // Real user code via Firebase
    if(!u){
      const theirCode=raw.toUpperCase().slice(0,8);
      try{
        await fbPush(`friendRequests/${theirCode}`,{fromCode:senderCode,fromName:senderName,fromAvatar:senderAvatar,sentAt:Date.now()});
        toast('Friend request sent!');
        return'sent';
      }catch(e){return'notfound';}
    }
    if(friends.includes(u.id))return'already';
    setNotifications(ns=>{
      if(ns.some(n=>n.type==='friendreq'&&n.fromId===u.id&&!n.accepted))return ns;
      return[{id:'fr'+Date.now(),type:'friendreq',fromId:u.id,fromName:u.name,fromAvatar:u.avatar,msg:`${u.name} wants to be your friend!`,read:false,time:'just now',accepted:false},...ns];
    });
    toast(`Friend request sent to ${u.name}!`);
    return'sent';
  },[friends,toast]);

  const acceptFriendRequest=useCallback(notifId=>{
    setNotifications(ns=>{
      const n=ns.find(x=>x.id===notifId);
      if(n&&!n.accepted){
        setFriends(f=>f.includes(n.fromId)?f:[...f,n.fromId]);
        // If URL-based friend (not a mock user), save their name+avatar too
        if(n.fromId&&n.fromId.startsWith('url_')){
          setVirtualFriends(vf=>({...vf,[n.fromId]:{id:n.fromId,name:n.fromName,avatar:n.fromAvatar||'⚽'}}));
        }
        // Notify Person A (the one who shared the link) via Firebase so their device adds us back
        const theirCode=n.fromId.replace('url_','');
        if(theirCode&&theirCode!==n.fromId){
          setUserRaw(u=>{
            if(u){
              fbPush(`friendAccepted/${theirCode}`,{fromCode:myCode,fromName:u.name,fromAvatar:u.avatar||'⚽',acceptedAt:Date.now()});
            }
            return u;
          });
        }
        setTimeout(()=>toast(`${n.fromName} added to your friends!`),0);
      }
      return ns.map(x=>x.id===notifId?{...x,accepted:true,read:true}:x);
    });
  },[toast,myCode]);

  const scores=useMemo(()=>{
    let total=0,correct=0,cur=0,best=0;
    const finished=matches.filter(m=>m.status==='finished').sort((a,b)=>a.kickoff-b.kickoff);
    finished.forEach(m=>{
      const r=scoreMatch(preds[m.id],m);total+=r.pts;
      if(!preds[m.id]){cur=0;}
      else if(r.flags.winner===true){correct++;cur++;best=Math.max(best,cur);}
      else if(r.flags.winner===false){cur=0;}
    });
    // Tournament picks points
    if(truth.revealed.champion&&tPicks.champion===truth.champion)total+=SCORING.champion;
    if(truth.revealed.top4)tPicks.top4.filter(Boolean).forEach(t=>{if(truth.top4.includes(t))total+=SCORING.top4;});
    if(truth.revealed.topScorer&&tPicks.topScorer===truth.topScorer)total+=SCORING.topScorer;
    if(truth.revealed.firstOut&&tPicks.firstOut===truth.firstOut)total+=SCORING.firstOut;
    const res=finished.filter(m=>preds[m.id]).length;
    return{total,correct,streak:best,accuracy:res?Math.round(correct/res*100):0};
  },[preds,matches,tPicks,truth]);

  const leaderboard=useMemo(()=>{
    const you={id:'you',name:user?.name||'You',avatar:user?.avatar||'⚽',pts:scores.total,acc:scores.accuracy,move:0,isYou:true};
    const FAKE_NAMES=new Set(['Maya O.','Diego F.','Priya S.','Tom B.','Aisha R.','Jordan K.','Sam L.','Chris M.']);
    const realOthers=Object.entries(fbUsers).filter(([code,u])=>code!==myCode&&!FAKE_NAMES.has(u?.name)).map(([code,u])=>({id:code,name:u.name||'?',avatar:u.avatar||'⚽',pts:u.pts||0,acc:u.acc||0,move:0}));
    return[...realOthers,you].sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name)).map((u,i)=>({...u,rank:i+1}));
  },[user,scores,fbUsers,myCode]);

  const myRank=leaderboard.find(u=>u.isYou)?.rank||11;
  const unread=notifications.filter(n=>!n.read).length;
  const pushNotif=useCallback(n=>setNotifications(ns=>[{...n,id:'ni'+Date.now(),read:false,time:'just now'},...ns]),[]);
  const signOut=()=>{try{['wc_user','wc_preds','wc_matches','wc_matches_version','wc_tourns','wc_tpicks','wc_friends','wc_vfriends','wc_palette','wc_notifs','wc_seen_badges','wc_mycode'].forEach(k=>localStorage.removeItem(k))}catch{}window.location.reload();};

  // ── Auto-reveal tournament picks results as matches finish ──
  useEffect(()=>{
    const finished=matches.filter(m=>m.status==='finished');

    // First eliminated: first team to lose in Round of 32 (new in 2026) or Round of 16
    if(!truth.revealed.firstOut){
      const knockout=finished.filter(m=>m.round==='Round of 32'||m.round==='Round of 16').sort((a,b)=>a.kickoff-b.kickoff);
      if(knockout.length>0){
        const m=knockout[0];
        const loser=m.hs>m.as?m.away:m.as>m.hs?m.home:null;
        if(loser&&loser!=='TBD')setTruth(t=>({...t,firstOut:loser,revealed:{...t.revealed,firstOut:true}}));
      }
    }

    // Top 4: when both semi-finals are finished
    if(!truth.revealed.top4){
      const sfs=finished.filter(m=>m.round?.includes('Semi'));
      if(sfs.length>=2){
        const top4=sfs.flatMap(m=>[m.home,m.away]);
        setTruth(t=>({...t,top4,revealed:{...t.revealed,top4:true}}));
      }
    }

    // Golden Boot: tally first scorers across all finished matches (real API data)
    if(!truth.revealed.topScorer){
      const finalDone=finished.find(m=>m.round==='🏆 World Cup Final'||m.id==='fin');
      if(finalDone){
        const tally={};
        finished.forEach(m=>{if(m.firstScorer)tally[m.firstScorer]=(tally[m.firstScorer]||0)+1;});
        const top=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
        if(top)setTruth(t=>({...t,topScorer:top,revealed:{...t.revealed,topScorer:true}}));
      }
    }

    // Champion: when the Final is finished (match from Firebase has round name, not fixed id)
    if(!truth.revealed.champion){
      const fin=finished.find(m=>m.round==='🏆 World Cup Final'||m.id==='fin');
      if(fin){
        const champion=fin.hs>fin.as?fin.home:fin.away;
        if(champion&&champion!=='TBD')setTruth(t=>({...t,champion,revealed:{...t.revealed,champion:true}}));
      }
    }
  },[matches]);

  // ── Firebase: listen for real team data (correct names + groups from API) ──
  useEffect(()=>{
    const unsub=fbOn('wcTeams',data=>{if(data)setWcTeams(data);});
    return unsub;
  },[]);

  // ── Firebase: listen for all registered users (global leaderboard) ──
  useEffect(()=>{
    const unsub=fbOn('users',data=>{setFbUsers(data||{});});
    return unsub;
  },[]);

  // ── Firebase: write user profile on load and whenever name/scores change ──
  useEffect(()=>{
    if(!user||!myCode)return;
    fbUpdate(`users/${myCode}`,{name:user.name,avatar:user.avatar||'⚽',favTeam:user.favTeam||null,pts:scores.total,acc:scores.accuracy,updatedAt:Date.now()}).catch(e=>console.warn('user write failed',e));
  },[myCode,user?.name,user?.avatar,scores.total,scores.accuracy]);

  // ── Firebase: keep points synced in every tournament the user is in ──
  useEffect(()=>{
    if(!user||!myCode)return;
    tournaments.filter(t=>t.fbCode).forEach(t=>{
      fbUpdate(`tournaments/${t.fbCode}/members/${myCode}`,{pts:scores.total,acc:scores.accuracy,updatedAt:Date.now()}).catch(()=>{});
    });
  },[scores.total,myCode,user,tournaments]);

  // ── Firebase: listen for live match score updates from any device ──
  useEffect(()=>{
    const unsub=fbOn('liveMatches',data=>{
      if(!data)return;
      setMatches(ms=>ms.map(m=>{
        const fb=data[m.id];
        if(!fb)return m;
        const safe=sanitizeMatch({...m,...fb});
        if(safe.status===m.status&&safe.hs===m.hs&&safe.as===m.as&&safe.minute===m.minute)return m;
        return safe;
      }));
    });
    return unsub;
  },[]);

  // ── Firebase: listen for friend acceptances (Person A gets notified when B accepts) ──
  useEffect(()=>{
    if(!myCode)return;
    const unsub=fbOn(`friendAccepted/${myCode}`,data=>{
      if(!data)return;
      Object.values(data).forEach(req=>{
        if(!req||!req.fromCode)return;
        const friendId='url_'+req.fromCode;
        setFriends(f=>f.includes(friendId)?f:[...f,friendId]);
        setVirtualFriends(vf=>vf[friendId]?vf:{...vf,[friendId]:{id:friendId,name:req.fromName,avatar:req.fromAvatar||'⚽'}});
      });
    });
    return unsub;
  },[myCode]);

  // ── Firebase: listen for incoming friend requests ──
  useEffect(()=>{
    if(!myCode)return;
    const unsub=fbOn(`friendRequests/${myCode}`,data=>{
      if(!data)return;
      Object.entries(data).forEach(([key,req])=>{
        if(!req||req.accepted)return;
        setNotifications(ns=>{
          if(ns.some(n=>n.fbKey===key))return ns;
          return[{id:'fr'+Date.now(),fbKey:key,fbPath:`friendRequests/${myCode}/${key}`,type:'friendreq',
            fromId:'url_'+req.fromCode,fromName:req.fromName,fromAvatar:req.fromAvatar||'⚽',
            msg:`${req.fromName} wants to be your friend!`,read:false,time:'just now',accepted:false},...ns];
        });
      });
    });
    return unsub;
  },[myCode]);

  // ── Firebase: listen for tournament member updates (for joined tournaments) ──
  useEffect(()=>{
    const unsubs=[];
    tournaments.forEach(t=>{
      if(!t.fbCode)return;
      const unsub=fbOn(`tournaments/${t.fbCode}/members`,members=>{
        if(!members)return;
        setTournaments(ts=>ts.map(x=>{
          if(x.fbCode!==t.fbCode)return x;
          const mArr=Object.entries(members).map(([k,v])=>({...v,memberCode:k,isYou:k===myCode}));
          return{...x,members:mArr};
        }));
      });
      unsubs.push(unsub);
    });
    return()=>unsubs.forEach(u=>u());
  },[tournaments.map(t=>t.fbCode).join(',')]);

  // ── Firebase: load REAL match fixtures from sync script ──
  useEffect(()=>{
    const unsub=fbOn('wcAllMatches',data=>{
      if(!data)return;
      const apiMatches=Object.values(data).sort((a,b)=>a.kickoff-b.kickoff);
      if(apiMatches.length===0)return;
      setMatches(ms=>{
        const updated=ms.map(local=>{
          const api=apiMatches.find(a=>a.id===local.id);
          if(!api)return local;
          const liveOrDone=local.status==='live'||local.status==='finished';
          const safe=sanitizeMatch(api);
          return{...local,...safe,...(liveOrDone?{status:local.status,hs:local.hs,as:local.as,minute:local.minute,firstScorer:local.firstScorer}:{})};
        });
        const newOnes=apiMatches.filter(api=>!ms.find(m=>m.id===api.id)).map(sanitizeMatch);
        return newOnes.length>0?[...updated,...newOnes]:updated;
      });
    });
    return unsub;
  },[]);

  // ── One-time cleanup: remove fake/seed users from Firebase leaderboard ──
  useEffect(()=>{
    if(load('wc_cleanup_fakes_v1'))return;
    const FAKE_NAMES=['Maya O.','Diego F.','Priya S.','Tom B.','Aisha R.','Jordan K.','Sam L.','Chris M.'];
    fbGet('users').then(data=>{
      if(!data)return;
      Object.entries(data).forEach(([code,u])=>{if(u&&FAKE_NAMES.includes(u.name))fbSet(`users/${code}`,null).catch(()=>{});});
      save('wc_cleanup_fakes_v1','done');
    }).catch(()=>{});
  },[]);

  // ── Badge popup system ──
  const[badgeQueue,setBadgeQueue]=useState([]);
  const[activeBadge,setActiveBadge]=useState(null);
  const earnedBadgeIds=useMemo(()=>computeEarnedBadges(preds,scores,matches,tPicks,truth),[preds,scores,matches,tPicks,truth]);

  useEffect(()=>{
    // Read seen badges fresh from localStorage each time to avoid stale closure
    let seen;try{seen=new Set(JSON.parse(localStorage.getItem('wc_seen_badges')||'[]'))}catch{seen=new Set();}
    const newOnes=[...earnedBadgeIds].filter(id=>!seen.has(id));
    if(newOnes.length===0)return;
    newOnes.forEach(id=>seen.add(id));
    try{localStorage.setItem('wc_seen_badges',JSON.stringify([...seen]))}catch{};
    setBadgeQueue(q=>[...q,...newOnes.map(id=>BADGES.find(b=>b.id===id)).filter(Boolean)]);
  },[earnedBadgeIds]);

  const dismissBadge=useCallback(()=>setActiveBadge(null),[]);

  useEffect(()=>{
    if(activeBadge||badgeQueue.length===0)return;
    const[next,...rest]=badgeQueue;
    setActiveBadge(next);
    setBadgeQueue(rest);
    const t=setTimeout(()=>setActiveBadge(null),3000);
    return()=>clearTimeout(t);
  },[badgeQueue,activeBadge]);

  // joinByCode — checks Firebase first, falls back to URL-encoded data
  const joinByCode=useCallback(async(input,userName,userAvatar,userCode)=>{
    const raw=input.trim();
    let td=null;
    if(raw.includes(':')){const enc=raw.split(':').slice(1).join(':');td=decData(enc);}
    if(!td){td=decData(raw);} // handle raw base64 from link hash
    const c=(td?.code||raw.replace(/.*#join[:-]?/i,'')).toUpperCase().slice(0,8);
    if(tournaments.some(t=>t.code===c))return'already';
    // Check Firebase first
    try{
      const fbData=await fbGet(`tournaments/${c}`);
      if(fbData){
        // Add yourself as a member in Firebase
        await fbUpdate(`tournaments/${c}/members/${userCode||'guest'}`,{name:userName,avatar:userAvatar,pts:scores.total,joinedAt:Date.now(),isYou:true});
        const members=Object.entries(fbData.members||{}).map(([k,v])=>({...v,isYou:k===(userCode||'guest')}));
        const newT={id:'t'+Date.now(),name:fbData.name,code:c,fbCode:c,creatorIsYou:false,createdAt:fbData.createdAt||Date.now(),members};
        setTournaments(ts=>[...ts,newT]);
        toast(`Joined "${fbData.name}"!`);
        return true;
      }
    }catch(e){}
    // Fallback: URL-encoded data
    if(td&&td.code){
      if(tournaments.some(t=>t.code===td.code))return'already';
      const newT={id:'t'+Date.now(),name:td.name,code:td.code,creatorIsYou:false,createdAt:Date.now(),
        members:[{name:userName,avatar:userAvatar,pts:scores.total,isYou:true},{name:td.creator||'Host',avatar:td.creatorAvatar||'🏆',pts:0,isYou:false}]};
      setTournaments(ts=>[...ts,newT]);
      toast(`Joined "${td.name}"!`);
      return true;
    }
    return false;
  },[tournaments,scores.total,toast]);

  const ctx={user,setUser,preds,savePred,matches,setMatches,tournaments,setTournaments,tPicks,setTPicks,friends,addFriend,removeFriend,sendFriendRequest,acceptFriendRequest,myCode,virtualFriends,palette,setPalette,PALETTES,PALETTE_NAMES,toasts,toast,notifications,setNotifications,pushNotif,scores,leaderboard,myRank,unread,signOut,joinByCode,earnedBadgeIds,activeBadge,dismissBadge,truth,setTruth,wcTeams};
  return(
    <Ctx.Provider value={ctx}>
      {children}
      <div className="fixed bottom-20 lg:bottom-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 items-center pointer-events-none">
        {toasts.map(t=>(
          <div key={t.id} className={`pop glass2 px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 pointer-events-auto ${
            t.type==='err'?'text-rose-300' : t.type==='goal'?'text-white':'text-em'
          }`} style={t.type==='goal'?{border:'1px solid rgb(251 191 36 / 0.6)',background:'rgba(251,191,36,0.15)'}:{}}>
            {t.type==='goal'?'':t.type==='err'?'✗ ':'✓ '}{t.msg}
          </div>
        ))}
      </div>
    </Ctx.Provider>
  );
}
const useWC=()=>useContext(Ctx);

/* ── PRIMITIVES ── */
function toFlagEmoji(iso){
  if(!iso)return'';
  if(iso==='gb-sct')return'🏴󠁧󠁢󠁳󠁣󠁴󠁿';
  if(iso==='gb-eng')return'🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(iso.length!==2)return'';
  return String.fromCodePoint(0x1F1E6+(iso.toUpperCase().charCodeAt(0)-65),0x1F1E6+(iso.toUpperCase().charCodeAt(1)-65));
}
function Flag({iso,size=24}){
  if(!iso)return null;
  const[err,setErr]=useState(false);

function Ico({name,size=18,className=''}){
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" className={`inline-block shrink-0 ${className}`} style={{width:size,height:size}}>
      {_I[name]||null}
    </svg>
  );
}
function CountUp({to=0}){
  const[val,setVal]=useState(0);const r=useRef();
  useEffect(()=>{const from=val,start=performance.now(),dur=600;cancelAnimationFrame(r.current);const tick=t=>{const k=Math.min(1,(t-start)/dur),e=1-Math.pow(1-k,3);setVal(Math.round(from+(to-from)*e));if(k<1)r.current=requestAnimationFrame(tick);};r.current=requestAnimationFrame(tick);return()=>cancelAnimationFrame(r.current);},[to]);
  return<>{val}</>;
}
function Countdown({to}){
  const[diff,setDiff]=useState(Math.max(0,to-Date.now()));
  useEffect(()=>{const id=setInterval(()=>setDiff(Math.max(0,to-Date.now())),1000);return()=>clearInterval(id);},[to]);
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1000);
  const U=({v,l})=><div className="flex flex-col items-center"><div className="font-display font-black text-3xl text-white tabular-nums w-14 text-center bg-white/5 rounded-xl py-1">{String(v).padStart(2,'0')}</div><div className="text-[10px] text-slate-500 font-semibold mt-1 uppercase tracking-widest">{l}</div></div>;
  return<div className="flex items-end gap-2"><U v={d} l="Days"/><span className="text-slate-600 font-black text-2xl mb-5">:</span><U v={h} l="Hrs"/><span className="text-slate-600 font-black text-2xl mb-5">:</span><U v={m} l="Min"/><span className="text-slate-600 font-black text-2xl mb-5">:</span><U v={s} l="Sec"/></div>;
}
function Btn({children,variant='primary',size='md',icon,onClick,disabled,className='',type='button'}){
  const sz={sm:'px-3 py-1.5 text-xs',md:'px-4 py-2 text-sm',lg:'px-6 py-3 text-base'};
  const vr={primary:'bg-em text-ink-950 font-bold shadow-glow hover:brightness-110',gold:'bg-gd text-ink-950 font-bold hover:brightness-110',ghost:'glass text-slate-200 hover:bg-white/10',danger:'bg-rose-600/80 text-white hover:bg-rose-600',subtle:'bg-em/10 text-em border border-em/25 hover:bg-em/20'};
  return<button type={type} className={`press inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed select-none whitespace-nowrap ${sz[size]} ${vr[variant]} ${className}`} onClick={onClick} disabled={disabled}>{icon&&<Ico name={icon} size={size==='sm'?14:16}/>}{children}</button>;
}

                <div key={lbl} className={`rounded-lg px-3 py-2 text-xs font-semibold flex items-center justify-between ${ok===true?'bg-em/15 text-em':ok===false?'bg-white/5 text-slate-500':'bg-white/3 text-slate-600'}`}>

      {canEdit&&(
        <div className="p-4 border-t border-white/6 space-y-2">
          <Btn className="w-full justify-center" size="lg" onClick={()=>{savePred(matchId,draft);onClose();}} disabled={!draft.winner||draft.hs==null||draft.as==null} icon="save">{existing?'Update prediction':'Save prediction'}</Btn>
          <p className="text-center text-xs text-slate-500">{existing?'Editing your pick':'Winner + score required'}</p>
        </div>
      )}
    </Modal>
  );
}

        {list.map(u=>(
          <div key={u.id} className={`flex items-center gap-3 px-4 py-4 border-b border-white/5 last:border-0 transition-all ${u.isYou?'bg-em/8 border-em/15':''}`}>
            <div className={`w-9 h-9 rounded-xl grid place-items-center text-sm font-black shrink-0 tabular-nums ${u.rank===1?'bg-gd text-ink-950':u.rank===2?'bg-slate-300 text-ink-950':u.rank===3?'bg-amber-600 text-white':'bg-white/8 text-slate-400'}`}>{u.rank}</div>
            <span className="text-2xl shrink-0">{u.avatar}</span>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-bold text-white truncate">{u.isYou?<span>You <Badge color="em">me</Badge></span>:u.name}</div>
              <div className="text-xs text-slate-500">{u.acc}% accuracy</div>
            </div>
            {u.move!==0&&<div className={`text-xs font-bold flex items-center gap-0.5 ${u.move>0?'text-em':'text-rose-400'}`}><Ico name={u.move>0?'arrow-up':'arrow-down'} size={12}/>{Math.abs(u.move)}</div>}
            <div className="text-right"><div className="font-display font-bold text-white text-lg tabular-nums">{u.pts}</div><div className="text-[10px] text-slate-500 font-semibold">PTS</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

              <div className="flex-1 min-w-0"><div className={`text-sm font-bold ${earned?'text-white':'text-slate-500'}`}>{b.name}</div><div className="text-xs text-slate-500 leading-snug">{b.desc}</div></div>
              {earned&&<Ico name="check-circle" size={18} className="text-em shrink-0"/>}

          );})}

      )}
    </div>
  );
}

/* ── TOURNAMENT PAGE ── */
function TournamentPage({autoJoinCode,onAutoJoinDone}){
  const{tournaments,setTournaments,user,tPicks,setTPicks,toast,pushNotif,friends,joinByCode,scores,virtualFriends,fbUsers}=useWC();
  const[view,setView]=useState('list');
  const[activeId,setActiveId]=useState(null);
  const{myCode}=useWC();
  const[createOpen,setCreateOpen]=useState(false);
  useEffect(()=>{
    if(!autoJoinCode||!user)return;
    joinByCode(autoJoinCode,user.name,user.avatar,myCode).then(result=>{
      if(result==='already')toast('You\'re already in this tournament!');
      else if(!result)toast('Tournament not found.','err');
      onAutoJoinDone&&onAutoJoinDone();
    });
  },[autoJoinCode,user,joinByCode,myCode,toast]);

  const createTournament=async(name)=>{
    const code=genCode();
    const t={
      id:'t'+Date.now(),name,code,fbCode:code,creatorIsYou:true,createdAt:Date.now(),
      members:[],
    };
    setTournaments(ts=>[...ts,t]);
    // Write to Firebase — members listener will populate local state
    try{
      await fbSet(`tournaments/${code}`,{name,code,creator:user.name,creatorAvatar:user.avatar,createdAt:Date.now(),members:{[myCode]:{name:user.name,avatar:user.avatar,pts:scores.total,joinedAt:Date.now()}}});
    }catch(e){console.warn('Firebase write failed',e);}
    setCreateOpen(false);
    toast(`Tournament "${name}" created!`);
    pushNotif({type:'announcement',msg:`Your tournament "${name}" is live! Copy the invite link and send it to friends.`});
  };

  if(view==='picks'){
    const tourn=tournaments.find(t=>t.id===activeId);
    return<PicksView tourn={tourn} onBack={()=>setView('list')}/>;
  }
  if(view==='detail'){
    const tourn=tournaments.find(t=>t.id===activeId);
    if(tourn) return<TournamentDetail tourn={tourn} onBack={()=>setView('list')} onPicks={()=>setView('picks')} scores={scores}/>;
  }

  return(
    <div className="space-y-5 pb-24 lg:pb-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div><h1 className="font-display font-black text-2xl text-white">Tournaments</h1><p className="text-slate-400 text-sm mt-1">Create a private league and share the link to invite friends.</p></div>
        <Btn onClick={()=>setCreateOpen(true)} icon="plus">Create</Btn>
      </div>

      {tournaments.length===0?(
        <div className="glass rounded-3xl p-12 text-center" style={{background:'radial-gradient(ellipse 100% 70% at 50% -20%,rgb(var(--c-em)/.10),transparent 60%)'}}>
          <div className="text-6xl mb-4">🏆</div>
          <h2 className="font-display font-bold text-xl text-white mb-2">No tournaments yet</h2>
          <p className="text-slate-400 text-sm mb-6 max-w-sm mx-auto">Create your own private league and share the link — friends join instantly.</p>
          <div className="flex gap-3 justify-center flex-wrap">
            <Btn size="lg" onClick={()=>setCreateOpen(true)} icon="plus">Create Tournament</Btn>
          </div>
        </div>
      ):(
        <div className="grid sm:grid-cols-2 gap-4">
          {tournaments.map(t=>{
            /* live points for user in this tournament */
            const members=[...t.members].map(m=>{
              const fb=m.memberCode?fbUsers[m.memberCode]:null;
              const name=m.name||fb?.name||'Player';
              const avatar=m.avatar||fb?.avatar||'⚽';
              return m.isYou?{...m,name,avatar,pts:scores.total}:{...m,name,avatar};
            }).sort((a,b)=>b.pts-a.pts);
            const myPos=members.findIndex(m=>m.isYou)+1;
            return(
              <div key={t.id} className="glass rounded-2xl p-5 flex flex-col gap-4">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <div className="flex gap-2 mb-1.5 flex-wrap"><Badge color="gold">Host</Badge><Badge>{t.members.length} players</Badge></div>
                    <h3 className="font-display font-bold text-lg text-white">{t.name}</h3>
                    <div className="flex items-center gap-2 mt-1">
                      <button onClick={()=>{
                        const url=makeJoinUrl(t,user);
                        try{navigator.clipboard&&navigator.clipboard.writeText(url)}catch(e){};
                        toast('Join link copied! Send it to friends.');
                      }} className="press text-xs text-slate-400 hover:text-em bg-white/5 px-2 py-1 rounded-lg flex items-center gap-1 transition-colors">
                        <Ico name="copy" size={11}/>Copy invite link
                      </button>
                    </div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="text-xs text-slate-500 mb-0.5">Your position</div>
                    <div className="font-display font-black text-2xl text-white">#{myPos}</div>
                  </div>
                </div>
                {/* Mini standings preview (top 3) */}
                <div className="glass rounded-xl overflow-hidden">
                  {members.slice(0,3).map((m,i)=>(
                    <div key={i} className={`flex items-center gap-2.5 px-3 py-2 border-b border-white/4 last:border-0 ${m.isYou?'bg-em/8':''}`}>
                      <div className={`w-5 h-5 rounded-md grid place-items-center text-[10px] font-black shrink-0 ${i===0?'bg-gd text-ink-950':i===1?'bg-slate-300 text-ink-950':i===2?'bg-amber-600 text-white':'bg-white/8 text-slate-400'}`}>{i+1}</div>
                      <span className="text-base">{m.avatar||'⚽'}</span>
                      <span className="text-xs font-semibold text-white flex-1 truncate">{m.isYou?'You':(m.name||'Player')}</span>
                      <span className="font-display font-bold text-white text-xs tabular-nums">{m.pts} pts</span>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <Btn className="flex-1" variant="subtle" onClick={()=>{setActiveId(t.id);setView('detail');}} icon="bar-chart-2">Standings</Btn>
                  <Btn className="flex-1" onClick={()=>{setActiveId(t.id);setView('picks');}} icon="list-checks">My Picks</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {createOpen&&<CreateTournModal onClose={()=>setCreateOpen(false)} onCreate={createTournament}/>}
    </div>
  );
}

/* ── TOURNAMENT DETAIL (PL-style standings) ── */
function TournamentDetail({tourn,onBack,onPicks,scores}){
  const{friends,setTournaments,toast,virtualFriends,fbUsers}=useWC();
  const members=[...tourn.members].map(m=>{
    const fb=m.memberCode?fbUsers[m.memberCode]:null;
    const name=m.name||fb?.name||'Player';
    const avatar=m.avatar||fb?.avatar||'⚽';
    return m.isYou?{...m,name,avatar,pts:scores.total}:{...m,name,avatar};
  }).sort((a,b)=>b.pts-a.pts);
  const{matches}=useWC();
  const totalMatches=matches.filter(m=>m.status==='finished').length;
  const[showAdd,setShowAdd]=useState(false);
  const[confirmRemove,setConfirmRemove]=useState(null); // member object to remove

  const removeMember=m=>{
    setTournaments(ts=>ts.map(t=>{
      if(t.id!==tourn.id)return t;
      return{...t,members:t.members.filter(x=>x.name!==m.name)};
    }));
    if(tourn.fbCode&&m.id)fbSet(`tournaments/${tourn.fbCode}/members/${m.id}`,null).catch(()=>{});
    toast(`${m.name} removed`);
    setConfirmRemove(null);
  };

  // Friends not already in this tournament
  const existingIds=new Set(tourn.members.map(m=>m.id).filter(Boolean));
  const addableFriends=friends.map(id=>virtualFriends&&virtualFriends[id]).filter(u=>u&&!existingIds.has(u.id));

  const addMember=u=>{
    setTournaments(ts=>ts.map(t=>t.id===tourn.id
      ?{...t,members:[...t.members,{id:u.id,name:u.name,avatar:u.avatar,pts:u.pts,isYou:false}]}
      :t));
    toast(`${u.name} added to ${tourn.name}!`);
  };

  return(
    <div className="space-y-5 pb-24 lg:pb-6">
      <div className="flex items-center gap-3">
        <button onClick={onBack} className="press w-10 h-10 glass rounded-xl grid place-items-center text-slate-300 shrink-0"><Ico name="arrow-left" size={18}/></button>
        <div className="flex-1 min-w-0">
          <h1 className="font-display font-black text-xl text-white truncate">{tourn.name}</h1>
        </div>
        <Btn size="sm" onClick={onPicks} icon="list-checks">My Picks</Btn>
      </div>

      {/* League table — PL-style */}
      <div className="glass rounded-2xl overflow-hidden">
        <div className="grid grid-cols-[40px_1fr_80px] px-4 py-2.5 border-b border-white/8">
          <div className="text-[10px] font-black uppercase tracking-widest text-slate-500 text-center">#</div>
          <div className="text-[10px] font-black uppercase tracking-widest text-slate-500 pl-2">Player</div>
          <div className="text-[10px] font-black uppercase tracking-widest text-slate-500 text-right">PTS</div>
        </div>
        {members.map((m,i)=>{
          const isTop=i<1,isPromo=i<3,isRel=i>=members.length-1&&members.length>3;
          return(
            <div key={i} className={`pl-row grid grid-cols-[40px_1fr_80px] items-center px-4 py-3.5 border-b border-white/5 last:border-0 relative ${m.isYou?'bg-em/8':''}`}>
              {isTop&&<div className="absolute left-0 top-0 bottom-0 w-0.5 bg-gd"/>}
              {!isTop&&isPromo&&<div className="absolute left-0 top-0 bottom-0 w-0.5 bg-em"/>}
              {isRel&&<div className="absolute left-0 top-0 bottom-0 w-0.5 bg-rose-500"/>}
              <div className={`grid place-items-center w-7 h-7 rounded-lg text-sm font-black mx-auto ${i===0?'bg-gd text-ink-950':i===1?'bg-slate-300 text-ink-950':i===2?'bg-amber-600 text-white':'bg-white/6 text-slate-400'}`}>{i+1}</div>
              <div className="flex items-center gap-3 pl-2">
                <span className="text-2xl">{m.avatar||'⚽'}</span>
                <div className="min-w-0">
                  <div className="font-bold text-white text-sm truncate">{m.isYou?<span>You<Badge color="em" className="ml-1.5">me</Badge></span>:(m.name||'Player')}</div>
                  {i===0&&<div className="text-[10px] text-gd font-bold">🥇 Leader</div>}
                  {i===members.length-1&&members.length>1&&i!==0&&<div className="text-[10px] text-rose-400 font-bold">Bottom</div>}
                </div>
              </div>
              <div className="flex items-center gap-2 justify-end">
                <div className="text-right">
                  <div className="font-display font-bold text-white tabular-nums">{m.pts}</div>
                  <div className="text-[10px] text-slate-500">pts</div>
                </div>
                {!m.isYou&&<button onClick={()=>setConfirmRemove(m)} className="press w-7 h-7 rounded-lg grid place-items-center text-slate-600 hover:text-rose-400 hover:bg-rose-500/10 transition-colors"><Ico name="x" size={14}/></button>}
              </div>
            </div>
          );
        })}
      </div>

      {confirmRemove&&(
        <Modal onClose={()=>setConfirmRemove(null)}>
          <div className="p-6 text-center">
            <div className="text-4xl mb-3">{confirmRemove.avatar||'👤'}</div>
            <h3 className="font-display font-bold text-white text-lg mb-1">Remove {confirmRemove.name}?</h3>
            <p className="text-slate-400 text-sm mb-6">They will be removed from this tournament.</p>
            <div className="flex gap-3 justify-center">
              <Btn variant="ghost" onClick={()=>setConfirmRemove(null)}>No, keep them</Btn>
              <Btn variant="danger" onClick={()=>removeMember(confirmRemove)}>Yes, remove</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Legend */}
      <div className="flex flex-wrap gap-3 text-xs text-slate-500">
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-gd"/>Leader</span>
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-em"/>Top 3</span>
        {members.length>3&&<span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-rose-500"/>Bottom</span>}
      </div>

      {/* Add members section */}
      <div className="glass rounded-2xl overflow-hidden border border-white/6">
        <button onClick={()=>setShowAdd(o=>!o)} className="press w-full flex items-center justify-between px-5 py-4">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-em/12 grid place-items-center"><Ico name="user-plus" size={17} className="text-em"/></div>
            <div className="text-left">
              <div className="font-display font-bold text-white text-sm">Add members</div>
              <div className="text-xs text-slate-500">{addableFriends.length} friend{addableFriends.length!==1?'s':''} you can invite</div>
            </div>
          </div>
          <Ico name={showAdd?'chevron-up':'chevron-down'} size={18} className="text-slate-500"/>
        </button>

        {showAdd&&(
          <div className="border-t border-white/6 px-4 pb-4 pt-3 space-y-2 sup">
            {addableFriends.length===0?(
              <div className="text-center text-sm text-slate-500 py-4">
                {friends.length===0
                  ?'You have no friends yet — add some from Profile → Friends.'
                  :'All your friends are already in this tournament! 🎉'}
              </div>
            ):addableFriends.map(u=>(
              <div key={u.id} className="flex items-center gap-3 glass rounded-xl px-3 py-2.5">
                <span className="text-xl">{u.avatar}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-bold text-white">{u.name}</div>
                  <div className="text-xs text-slate-500">{u.pts} pts · {u.acc}% accuracy</div>
                </div>
                <Btn size="sm" onClick={()=>addMember(u)} icon="plus">Add</Btn>
              </div>
            ))}
            <p className="text-[11px] text-slate-600 text-center pt-1">Share the invite link from the tournament card to add more members.</p>
          </div>
        )}
      </div>

      <div className="glass rounded-2xl p-4 text-center text-sm text-slate-400">
        <Ico name="info" size={14} className="text-em inline-block mr-1.5"/>
        Points based on live match predictions · {totalMatches} match{totalMatches!==1?'es':''} settled so far
      </div>
    </div>
  );
}

/* ── CREATE TOURNAMENT MODAL ── */

      <div className="p-5 border-b border-white/6 flex items-center justify-between">
        <div><h3 className="font-display font-bold text-white">Create Tournament</h3><p className="text-xs text-slate-500">Name it — share the join link to invite people.</p></div>
        <button onClick={onClose} className="press w-8 h-8 glass rounded-xl grid place-items-center text-slate-400"><Ico name="x" size={16}/></button>
      </div>
      <div className="p-5 space-y-5">
        <div>
          <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Tournament name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. The Group Chat Cup" autoFocus/>
        </div>
        <div className="glass rounded-xl p-4 flex items-center gap-4">
          <div className="w-10 h-10 rounded-xl bg-em/15 grid place-items-center shrink-0"><Ico name="hash" size={18} className="text-em"/></div>
          <div className="flex-1">
            <div className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Your tournament code</div>
            <div className="font-mono font-black text-em text-2xl tracking-widest">{previewCode}</div>
          </div>
        </div>
        <div className="glass rounded-xl p-4 text-sm text-slate-400 flex items-start gap-3">
          <Ico name="info" size={16} className="text-em shrink-0 mt-0.5"/>
          <span>After creating, tap <b className="text-white">Copy link</b> on the tournament card and send it to friends. They open the link and join instantly.</span>
        </div>
      </div>
      <div className="p-4 border-t border-white/6 flex gap-2 justify-end">
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn disabled={!canCreate} onClick={()=>onCreate(name)} icon="arrow-right">Create Tournament</Btn>
      </div>
    </Modal>
  );
}

/* ── JOIN TOURNAMENT MODAL ── */
function JoinTournModal({onClose,prefillCode}){
  const{user,joinByCode}=useWC();
  const[code,setCode]=useState(prefillCode||'');
  const[status,setStatus]=useState(null); // null | 'notfound' | 'already' | 'ok'

  const{myCode}=useWC();
  const tryJoin=async()=>{
    if(code.trim().length<4)return;
    const result=await joinByCode(code,user.name,user.avatar,myCode);
    if(result===true)setStatus('ok');
    else if(result==='already')setStatus('already');
    else setStatus('notfound');
  };

  return(
    <Modal onClose={onClose}>
      <div className="p-5 border-b border-white/6 flex items-center justify-between">
        <div><h3 className="font-display font-bold text-white">Join a Tournament</h3><p className="text-xs text-slate-500">Enter the 6-character code shared by the host.</p></div>
        <button onClick={onClose} className="press w-8 h-8 glass rounded-xl grid place-items-center text-slate-400"><Ico name="x" size={16}/></button>
      </div>
      <div className="p-6 space-y-4">
        {status==='ok'?(
          <div className="text-center py-6 sup">
            <div className="text-5xl mb-3">🎉</div>
            <div className="font-display font-black text-xl text-white mb-1">You're in!</div>
            <p className="text-slate-400 text-sm mb-4">Tournament joined successfully.</p>
            <Btn onClick={onClose} icon="check">View Tournaments</Btn>
          </div>
        ):(
          <>
            <div>
              <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Tournament Code</label>
              <input
                value={code} onChange={e=>setCode(e.target.value)}
                placeholder="e.g. WC7K2P"
                className="text-center font-mono font-black text-em text-2xl tracking-widest h-14"
                maxLength={6}
                onKeyDown={e=>e.key==='Enter'&&tryJoin()}
              />
              {status==='notfound'&&<p className="text-rose-400 text-xs mt-1.5 font-semibold">No tournament found with that code. Check with your host.</p>}
              {status==='already'&&<p className="text-gd text-xs mt-1.5 font-semibold">You're already in this tournament!</p>}
            </div>
            <Btn className="w-full" onClick={tryJoin} disabled={code.length<4} icon="log-in">Join Tournament</Btn>
            <p className="text-center text-xs text-slate-600">Ask the tournament creator for their 6-character code.</p>
          </>
        )}
      </div>
    </Modal>
  );
}

/* ── PICKS VIEW ── */
function PicksSec({n,icon,title,sub,done,locked,children}){
  return(
    <div className="glass rounded-2xl p-5">
      <div className="flex items-start gap-3 mb-4">
        <div className={`w-10 h-10 rounded-xl grid place-items-center text-xl shrink-0 ${done?'bg-em/15':'bg-white/5'}`}>{icon}</div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2"><span className="text-xs font-bold text-slate-500">STEP {n}</span>{done&&<span className="text-em text-xs">✓</span>}</div>
          <h3 className="font-display font-bold text-white">{title}</h3>
          <p className="text-xs text-slate-400 mt-0.5">{sub}</p>
        </div>
      </div>
      <div className={locked?'opacity-60 pointer-events-none':''}>{children}</div>
    </div>
  );
}

function PicksView({tourn,onBack}){
  const{tPicks,setTPicks,toast,scores}=useWC();
  const[q,setQ]=useState('');
  const locked=tPicks.locked;
  const set=patch=>setTPicks(p=>({...p,...patch}));
  const toggleTop4=code=>{
    if(locked)return;
    const arr=[...tPicks.top4];const idx=arr.indexOf(code);
    if(idx>=0)arr[idx]=null;else{const open=arr.indexOf(null);if(open>=0)arr[open]=code;}
    set({top4:arr});
  };
  const filteredPlayers=PLAYERS.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  const complete=tPicks.champion&&tPicks.top4.filter(Boolean).length===4&&tPicks.topScorer&&tPicks.firstOut;
  const maxPts=SCORING.champion+SCORING.top4*4+SCORING.topScorer+SCORING.firstOut;

  return(
    <div className="space-y-5 pb-28 lg:pb-8">
      <div className="flex items-center gap-3">
        <button onClick={onBack} className="press w-10 h-10 glass rounded-xl grid place-items-center text-slate-300 shrink-0"><Ico name="arrow-left" size={18}/></button>
        <div>
          <h1 className="font-display font-black text-xl text-white">Choose Your Picks</h1>
          <p className="text-slate-400 text-xs">{tourn?.name||'Tournament'} · up to {maxPts} pts</p>
        </div>
        <div className="ml-auto">{locked?<Badge color="gold">🔒 Locked</Badge>:complete?<Badge color="em">Ready to lock</Badge>:<Badge>{[tPicks.champion,tPicks.top4.filter(Boolean).length===4,tPicks.topScorer,tPicks.firstOut].filter(Boolean).length}/4</Badge>}</div>
      </div>

      <PicksSec locked={locked} n={1} icon="🏆" title="World Cup Winner" sub={`Who lifts the trophy? · +${SCORING.champion} pts`} done={!!tPicks.champion}>
        <div className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-2">
          {TEAMS.map(t=>{const on=tPicks.champion===t.id;return(
            <button key={t.id} onClick={()=>set({champion:on?null:t.id})} className={`press flex flex-col items-center gap-1.5 p-2.5 rounded-xl border transition-all ${on?'border-em bg-em/15':'border-white/8 bg-white/4 hover:border-white/20'}`}>
              <Flag iso={t.iso} size={36}/><span className="text-[10px] font-bold text-slate-300">{t.id}</span>{on&&<Ico name="check-circle" size={14} className="text-em"/>}
            </button>
          );})}
        </div>
      </PicksSec>

      <PicksSec locked={locked} n={2} icon="🥇" title="Top 4 Finish" sub={`Pick your semi-finalists in order · +${SCORING.top4} pts each`} done={tPicks.top4.filter(Boolean).length===4}>
        <div className="grid grid-cols-4 gap-2 mb-4">
          {tPicks.top4.map((code,i)=>(
            <div key={i} className={`rounded-xl border p-2.5 text-center ${code?'bg-em/12 border-em/35':'bg-white/4 border-dashed border-white/12'}`}>
              <div className="text-[10px] font-bold text-slate-400 mb-1.5">{['1st','2nd','3rd','4th'][i]}</div>
              {code?<><Flag iso={TEAM[code]?.iso} size={32} className="mx-auto block"/><div className="text-[10px] font-bold text-white mt-1">{code}</div></>:<div className="text-slate-600 text-xl py-1">—</div>}
            </div>
          ))}
        </div>
        <div className="grid grid-cols-4 sm:grid-cols-6 gap-1.5">
          {TEAMS.map(t=>{const pos=tPicks.top4.indexOf(t.id);const on=pos>=0;const full=tPicks.top4.filter(Boolean).length>=4&&!on;return(
            <button key={t.id} disabled={full} onClick={()=>toggleTop4(t.id)} className={`press relative flex flex-col items-center gap-1 p-2 rounded-xl border transition-all ${on?'border-em bg-em/15':full?'opacity-25 border-white/5 cursor-not-allowed':'border-white/8 bg-white/4 hover:border-white/20'}`}>
              <Flag iso={t.iso} size={28}/><span className="text-[10px] font-bold text-slate-300">{t.id}</span>
              {on&&<span className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-em text-ink-950 text-[10px] font-black grid place-items-center">{pos+1}</span>}
            </button>
          );})}
        </div>
      </PicksSec>

      <PicksSec locked={locked} n={3} icon="⚽" title="Golden Boot" sub={`Tournament top scorer · +${SCORING.topScorer} pts`} done={!!tPicks.topScorer}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search players..." className="mb-3 text-sm"/>
        <div className="grid sm:grid-cols-2 gap-2 max-h-64 overflow-y-auto pr-1">
          {filteredPlayers.map(p=>{const on=tPicks.topScorer===p.id;return(
            <button key={p.id} onClick={()=>set({topScorer:on?null:p.id})} className={`press flex items-center gap-2.5 p-2.5 rounded-xl border transition-all text-left ${on?'border-em bg-em/15':'border-white/8 bg-white/4 hover:border-white/20'}`}>
              <Flag iso={TEAM[p.team]?.iso} size={24}/>
              <div className="min-w-0 flex-1"><div className={`text-sm font-bold truncate ${on?'text-white':'text-slate-200'}`}>{p.name}</div><div className="text-xs text-slate-500">{TEAM[p.team]?.name} · {p.pos}</div></div>
              {on&&<Ico name="check-circle" size={16} className="text-em shrink-0"/>}
            </button>
          );})}
        </div>
      </PicksSec>

      <PicksSec locked={locked} n={4} icon="🚪" title="First Eliminated" sub={`Who goes out first? · +${SCORING.firstOut} pts`} done={!!tPicks.firstOut}>
        <div className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-2">
          {TEAMS.map(t=>{const on=tPicks.firstOut===t.id;return(
            <button key={t.id} onClick={()=>set({firstOut:on?null:t.id})} className={`press flex flex-col items-center gap-1.5 p-2.5 rounded-xl border transition-all ${on?'border-rose-500 bg-rose-500/15':'border-white/8 bg-white/4 hover:border-white/20'}`}>
              <Flag iso={t.iso} size={36}/><span className="text-[10px] font-bold text-slate-300">{t.id}</span>
            </button>
          );})}
        </div>
      </PicksSec>

      <div className="sticky bottom-20 lg:bottom-4 z-20">
        <div className="glass2 rounded-2xl p-3.5 flex items-center justify-between gap-3 border border-white/8">
          <div className="text-sm text-slate-400 px-1">{locked?<span className="text-gd font-semibold">🔒 Picks locked in</span>:complete?<span className="text-em font-semibold">All done — lock it in!</span>:'Complete all 4 steps to lock'}</div>
          {locked?<Btn variant="ghost" icon="lock-open" onClick={()=>set({locked:false})}>Unlock</Btn>
          :<Btn variant="gold" icon="lock" disabled={!complete} onClick={()=>set({locked:true})}>Lock Predictions</Btn>}
        </div>
      </div>
    </div>
  );
}

/* ── SETTINGS ── */

    <div className="space-y-5 pb-24 lg:pb-6">
      <h1 className="font-display font-black text-2xl text-white">Settings</h1>
      <div className="glass rounded-2xl p-5 space-y-4">
        <div className="font-display font-bold text-white text-sm">Profile</div>
        <div><label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Display name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/></div>
        <div>
          <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Avatar</label>

        </div>
        <div>
          <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Favourite team</label>
          <div className="grid grid-cols-6 sm:grid-cols-8 gap-1.5 max-h-28 overflow-y-auto pr-1">{TEAMS.map(t=><button key={t.id} onClick={()=>setFavTeam(t.id)} title={t.name} className={`press aspect-square rounded-lg grid place-items-center border transition-all ${favTeam===t.id?'border-em bg-em/15 scale-105':'border-white/8 bg-white/4 hover:border-white/20'}`}><Flag iso={t.iso} size={24}/></button>)}</div>
        </div>
        <Btn onClick={save} icon="save">Save profile</Btn>
      </div>
      <div className="glass rounded-2xl p-5">
        <div className="font-display font-bold text-white text-sm mb-3">Theme</div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2.5">

      </div>
      <div className="glass rounded-2xl p-5 border border-rose-500/20">
        <div className="font-display font-bold text-white text-sm mb-1">Danger zone</div>

/* ── FRIENDS PAGE ── */

  const[status,setStatus]=useState(null); // null | 'sent' | 'notfound' | 'already'
  const friendUsers=friends.map(id=>(virtualFriends&&virtualFriends[id])).filter(Boolean);

  const handleSend=async()=>{
    const result=await sendFriendRequest(code,user?.name,user?.avatar,myCode);
    setStatus(result);
    if(result==='sent')setCode('');
  };

  return(
    <div className="space-y-5 pb-24 lg:pb-6">
      <div>
        <h1 className="font-display font-black text-2xl text-white">Friends</h1>
        <p className="text-slate-400 text-sm mt-1">Share your code so others can add you, or enter their code to send a request.</p>
      </div>

      {/* Your friend link */}
      <div className="glass rounded-2xl p-5 border border-em/20 relative overflow-hidden">
        <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(ellipse 80% 60% at 100% -20%,rgb(var(--c-em)/.10),transparent 60%)'}}/>
        <div className="relative">
          <div className="text-xs font-bold text-em uppercase tracking-wider mb-3 flex items-center gap-1.5"><Ico name="user-plus" size={13}/>Your Friend Link</div>
          <button onClick={()=>{const url=makeFriendUrl(user?.name||'Friend',user?.avatar||'⚽',myCode);try{navigator.clipboard&&navigator.clipboard.writeText(url)}catch(e){};toast('Friend link copied!');}} className="press w-full glass rounded-2xl px-5 py-4 flex items-center justify-between gap-4 hover:border-em/40 transition-all border border-white/8">
            <div>
              <div className="font-bold text-white text-sm">Copy your invite link</div>
              <div className="text-xs text-slate-400 mt-0.5">Send it to a friend — when they open it they can add you instantly</div>
            </div>
            <Ico name="copy" size={20} className="text-em shrink-0"/>

      </div>

      {/* Friends list */}
      <div>
        <div className="flex items-center justify-between mb-3">
          <span className="font-display font-bold text-white text-sm">Your Friends</span>

            <div className="text-5xl mb-3">👥</div>
            <div className="font-display font-bold text-white mb-1">No friends yet</div>

              <div key={u.id} className="flex items-center gap-3 px-4 py-4 border-b border-white/5 last:border-0">

                <div className="flex-1 min-w-0">
                  <div className="text-sm font-bold text-white">{u.name}</div>
                  <div className="text-xs text-slate-500">{u.pts} pts · {u.acc}% acc</div>

                <button onClick={()=>removeFriend(u.id)} className="press text-slate-600 hover:text-rose-400 transition-colors p-3 rounded-xl hover:bg-rose-500/10">
                  <Ico name="user-minus" size={18}/>

            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP SHELL ── */
function Shell(){
  const{user,setNotifications}=useWC();
  const[page,setPage]=useState(()=>{try{return localStorage.getItem('wc_page')||'home'}catch{return'home'}});
  const[matchId,setMatchId]=useState(null);
  const[bellOpen,setBellOpen]=useState(false);
  const[hashJoinCode,setHashJoinCode]=useState(null);
  useEffect(()=>{try{localStorage.setItem('wc_page',page)}catch{}},[page]);

  // Detect #join:DATA or #friend:DATA in URL
  useEffect(()=>{
    const hash=window.location.hash;
    if(!hash)return;
    window.location.hash='';
    // Tournament join link
    const joinMatch=hash.match(/^#join[:-](.+)$/i);
    if(joinMatch){setHashJoinCode(joinMatch[1]);setPage('tournament');return;}
    // Friend request link
    const friendMatch=hash.match(/^#friend[:-](.+)$/i);
    if(friendMatch){
      const data=decData(friendMatch[1]);
      if(data&&data.name){
        // Add a friend request notification — user accepts from bell
        const fromId='url_'+(data.code||Date.now());
        setNotifications(ns=>{
          if(ns.some(n=>n.fromId===fromId&&n.type==='friendreq'&&!n.accepted))return ns;
          return[{id:'fr'+Date.now(),type:'friendreq',fromId,fromName:data.name,fromAvatar:data.avatar||'⚽',
            msg:`${data.name} wants to be your friend!`,read:false,time:'just now',accepted:false},...ns];
        });
        setBellOpen(true);
      }
    }
  },[]);

  if(!user)return<NameGate/>;
  const goPage=p=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'});};
  const pages={home:<HomePage setPage={goPage} openMatch={setMatchId}/>,tournament:<TournamentPage autoJoinCode={hashJoinCode} onAutoJoinDone={()=>setHashJoinCode(null)}/>,matches:<MatchesPage openMatch={setMatchId}/>,leaderboard:<LeaderboardPage/>,friends:<FriendsPage/>,profile:<ProfilePage setPage={goPage} openMatch={setMatchId}/>,settings:<SettingsPage/>};

  return(
    <div className="min-h-screen flex">
      <Sidebar page={page} setPage={goPage}/>
      <div className="flex-1 min-w-0 flex flex-col">
        <Topbar page={page} setPage={goPage} setBellOpen={setBellOpen}/>
        <main className="flex-1 px-4 sm:px-6 py-5 pb-28 lg:pb-6 max-w-5xl w-full mx-auto lg:mx-0 lg:max-w-none">
          <div key={page} className="sup">{pages[page]||pages.home}</div>
        </main>
      </div>
      <BottomTabs page={page} setPage={goPage}/>
      {matchId&&<PredModal matchId={matchId} onClose={()=>setMatchId(null)}/>}
      {bellOpen&&<BellPanel onClose={()=>setBellOpen(false)}/>}
      <BadgePopup/>
    </div>
  );
}

function App(){return<Provider><Shell/></Provider>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
